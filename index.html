<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 10px;
    background: #f4f4f4;
}

h1 { text-align: center; }

.player {
    display: flex;
    align-items: center;

    padding: 8px;

}

/* Name bekommt den meisten Platz */

}

/* Skill kompakt halten */
.player select {
    width: 110px;
    flex-shrink: 0;
}

/* Checkbox fix rechts */
.player input[type="checkbox"] {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
}

input, select {
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;

}

.secondary { background: #2196F3; color: white; }

.team {
    background: white;
    margin: 10px 0;
    padding: 15px;
    border-radius: 12px;
	box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

body.dark {
    background: #121212;
    color: #eee;
}

body.dark .player,
body.dark .team {
    background: #1e1e1e;
}

body.dark button {
    background: #333;

}

}

body.dark .secondary {
    background: #2196F3;
}

body.dark input::placeholder {

}

body.dark input:focus,
body.dark select:focus {

    border: 1px solid #4CAF50;
}

body.dark input,
body.dark select {
    background: #2a2a2a;
    color: #ffffff;
    border: 1px solid #555;
    border-radius: 6px;
}

/* iOS Safari Fix */
body.dark select {
    appearance: none;
    -webkit-appearance: none;
    padding-right: 25px;
}

	body.dark select {
    background-image: linear-gradient(45deg, transparent 50%, white 50%),
                      linear-gradient(135deg, white 50%, transparent 50%);
    background-position: calc(100% - 15px) center,
                         calc(100% - 10px) center;
    background-size: 5px 5px;
    background-repeat: no-repeat;

<body>

<h1>🏐 Team Generator SV Cotta</h1>

<img src="https://8a04f4b6a0.clvaw-cdnwnd.com/f4f32037804f2dabe9ada9872c5ba9ee/200000310-03c2403c26/700/Bild1.webp?ph=8a04f4b6a0"
     style="display:block; margin:10px auto; max-width:300px;">

<div id="generatorTab">
	 
	 <div style="display:flex; gap:5px; margin-bottom:15px;">
    <button onclick="showTab('generator')" class="secondary">
        🏐 Team Generator
    </button>

    <button onclick="showTab('tournament')" class="secondary">
        🏆 Turnierplaner
    </button>
</div>

<div style="margin:10px 0; display:flex; align-items:center; gap:10px;">
    <label for="teamCount" style="font-weight:bold;">Teams:</label>
    
    <select id="teamCount" style="font-size:16px; padding:5px;">
        <option>2</option>
        <option selected>3</option>
        <option>4</option>
        <option>5</option>
    </select>
</div>

<label style="display:block; margin:10px 0;">
    <input type="checkbox" id="trainerMode" onchange="renderPlayers()">
    🔒 Trainer-Modus
</label>

    <input type="checkbox" id="darkMode" onchange="toggleDarkMode()">
    🌙 Dark Mode
</label>

<div id="players"></div>

<button class="secondary" onclick="addPlayer()">➕ Spieler hinzufügen</button>

<div style="display:flex; gap:10px;">
    <button style="background:#f44336; color:white;" onclick="setAll(false)">
        ❌ Alle abwesend
    </button>

    <button style="background:#4CAF50; color:white;" onclick="setAll(true)">
        ✅ Alle anwesend
    </button>
</div>

<button class="main-btn" onclick="generateTeams()">Teams generieren</button>
<button onclick="generateTeams()">🔀 Neu mischen</button>

<div id="teams"></div>
</div>

<div id="tournamentTab" style="display:none;">

<h2>🏆 Turnierplaner</h2>

<div class="team">

<h3>🏐 Teams</h3>

<div id="teamTable"></div>

</div>

<label>Teams:</label>
<select
id="tournamentTeams"
onchange="renderTeamTable()">

    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option selected>8</option>
    <option>9</option>
    <option>10</option>
    <option>11</option>
    <option>12</option>

</select>

<br><br>

<label>Felder:</label>
<select id="courtCount">
    <option value="1">1 Feld</option>
    <option value="2">2 Felder</option>
</select>

<br><br>

<label>Modus:</label>
<select id="tournamentMode">
    <option value="roundRobin">Jeder gegen Jeden</option>
    <option value="groups">2 Gruppen</option>
    <option value="groupsPlacement">Gruppen + komplette Platzierung</option>
</select>

<br><br>

<label>Spielzeit (Minuten):</label>
<input type="number" id="gameDuration" value="10">

<br><br>

<label>Wechselzeit (Minuten):</label>
<input type="number" id="changeTime" value="2">

<br><br>

<label>Startzeit:</label>
<input type="time" id="startTime" value="09:00">

<br><br>

<button class="main-btn"
onclick="generateTournament()">
🏆 Turnier erstellen
</button>

<div id="tournamentOutput"></div>

</div>

<script>
let players = JSON.parse(localStorage.getItem("players")) || [
    {name:"Thomas", skill:2, present:true},
    {name:"Susu", skill:2, present:true}
];

	const skillNames = {
    1: "Rookie",
    2: "Hobby",
    3: "Stabil",
    4: "Maschine"
};
	
function save() {
    localStorage.setItem("players", JSON.stringify(players));
}

function renderPlayers() {
    let div = document.getElementById("players");
    div.innerHTML = "";

    let trainer = document.getElementById("trainerMode")?.checked;

    players.forEach((p, i) => {
        div.innerHTML += `
        <div class="player">
            <input value="${p.name}" 
                ${!trainer ? "disabled" : ""}
                onchange="players[${i}].name=this.value; save()">

            <select 
                ${!trainer ? "disabled" : ""}
                onchange="players[${i}].skill=this.value; save()">
              ${[1,2,3,4].map(s => 
				    `<option ${p.skill==s?"selected":""}>
				        ${s} - ${skillNames[s]}
				    </option>`
				).join("")}
            </select>

            <input type="checkbox" ${p.present?"checked":""}
                onchange="players[${i}].present=this.checked; save()">
        </div>
        `;
    });
}

function addPlayer() {
    if (!document.getElementById("trainerMode").checked) {
        alert("Nur im Trainer-Modus möglich");
        return;
    }

    players.push({name:"Neu", skill:2, present:true});
    save();
    renderPlayers();
}

function setAll(state) {
    players.forEach(p => p.present = state);
    save();
    renderPlayers();
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function generateTeams() {
    let teamCount = parseInt(document.getElementById("teamCount").value);
    let active = players.filter(p => p.present);

    if (active.length < teamCount) {
        alert("Zu wenig Spieler!");
        return;
    }

    let bestTeams = null;
    let bestScore = Infinity;

    let minSize = Math.floor(active.length / teamCount);
    let maxSize = Math.ceil(active.length / teamCount);

    for (let attempt = 0; attempt < 300; attempt++) {

        let shuffled = [...active];
        shuffle(shuffled);

        let teams = Array.from({length: teamCount}, () => []);
        let teamSkill = Array(teamCount).fill(0);

        shuffled.forEach(p => {

            // Teams finden, die noch nicht "voll" sind
            let possibleTeams = teams
                .map((team, i) => ({i, size: team.length}))
                .filter(t => t.size < maxSize);

            // davon das mit niedrigstem Skill wählen
            let minIndex = possibleTeams.reduce((best, t) =>
                teamSkill[t.i] < teamSkill[best] ? t.i : best
            , possibleTeams[0].i);

            teams[minIndex].push(p);
            teamSkill[minIndex] += parseInt(p.skill);
        });

        let diff = Math.max(...teamSkill) - Math.min(...teamSkill);

        // leichte Strafe für ungleiche Teamgrößen
        let sizePenalty = teams.reduce((sum, t) => sum + Math.abs(t.length - minSize), 0);

        let score = diff + sizePenalty * 2;

        if (score < bestScore) {
            bestScore = score;
            bestTeams = teams;
        }
    }

    renderTeams(bestTeams);
}

function renderTeams(teams) {
    let out = document.getElementById("teams");
    out.innerHTML = "";

    let skills = teams.map(team =>
        team.reduce((sum,p)=>sum+parseInt(p.skill),0)
    );

    let diff = Math.max(...skills) - Math.min(...skills);

    out.innerHTML += `<b>Skill-Differenz: ${diff}</b>`;

    teams.forEach((team, i) => {
        let total = skills[i];

        out.innerHTML += `
        <div class="team">
            <b>Team ${i+1} (Skill: ${total})</b><br>
            ${team.map(p => `${p.name} (${skillNames[p.skill]})`).join("<br>")}
        </div>
        `;
    });
}

function toggleDarkMode() {
    let enabled = document.getElementById("darkMode").checked;

    document.body.classList.toggle("dark", enabled);

    localStorage.setItem("darkMode", enabled);
}

renderPlayers();

let dark = localStorage.getItem("darkMode") === "true";

if (dark) {
    document.body.classList.add("dark");
    document.getElementById("darkMode").checked = true;
}

function showTab(tab) {

    document.getElementById("generatorTab").style.display =
        tab === "generator" ? "block" : "none";

    document.getElementById("tournamentTab").style.display =
        tab === "tournament" ? "block" : "none";
}

function generateRoundRobin(teamList) {

    let teams = [...teamList];

    if (teams.length % 2 !== 0) {
        teams.push("SPIELFREI");
    }

    let rounds = [];
    let n = teams.length;

    for (let round = 0; round < n - 1; round++) {

        let matches = [];

        for (let i = 0; i < n / 2; i++) {

            let home = teams[i];
            let away = teams[n - 1 - i];

            if (
                home !== "SPIELFREI" &&
                away !== "SPIELFREI"
            ) {
                matches.push([home, away]);
            }
        }

        rounds.push(matches);

        let fixed = teams[0];

        let rotating = teams.slice(1);

        rotating.unshift(rotating.pop());

        teams = [fixed, ...rotating];
    }

    return rounds;
}

function renderTeamTable(){

    let count =
        parseInt(
            document.getElementById(
                "tournamentTeams"
            ).value
        );

    let html = `
    <table style="width:100%;border-collapse:collapse;">
    <tr>
        <th>Team</th>
        <th>Verein</th>
        <th>Start</th>
    </tr>
    `;

    for(let i=0;i<count;i++){

        html += `
        <tr>

        <td>
            <input
            id="teamName${i}"
            value="Team ${i+1}"
            style="
			width:95%;
			box-sizing:border-box;
			">
        </td>

        <td>
            <input
				id="teamClub${i}"
				placeholder="Verein"
				style="
				width:95%;
				box-sizing:border-box;
				">
        </td>

        <td>
            <select id="teamStart${i}">
                <option value="normal">
                    Normal
                </option>

                <option value="late">
                    Spät
                </option>
            </select>
        </td>

        </tr>
        `;
    }

    html += `</table>`;

    document.getElementById(
        "teamTable"
    ).innerHTML = html;
}

function getClub(teamName, teamData){

    let team =
        teamData.find(
            t => t.name === teamName
        );

    return team ? team.club : "";
}

function generateTournament() {

    let teams =
        parseInt(document.getElementById("tournamentTeams").value);

    let courts =
        parseInt(document.getElementById("courtCount").value);

    let mode =
        document.getElementById("tournamentMode").value;

    let gameDuration =
        parseInt(document.getElementById("gameDuration").value);

    let changeTime =
        parseInt(document.getElementById("changeTime").value);

    let startTime =
        document.getElementById("startTime").value;

	let matches = [];
	let groupInfo = "";

	let groupMatches = 0;
	let placementMatches = 0;

let teamData = [];

for(let i=0;i<teams;i++){

    teamData.push({

        name:
            document.getElementById(
                "teamName"+i
            ).value || ("Team "+(i+1)),

        club:
            document.getElementById(
                "teamClub"+i
            ).value || "",

        late:
            document.getElementById(
                "teamStart"+i
            ).value === "late"
    });
}

let names =
    teamData.map(t => t.name);
	
	let refereeCount = {};
	
	let lateTeams =
    teamData
        .filter(t => t.late)
        .map(t => t.name);
		console.log("Late Teams:", lateTeams);

function sortLateMatches(round){

    round.sort((a,b)=>{

        let aLate =
            lateTeams.includes(a[0]) ||
            lateTeams.includes(a[1]);

        let bLate =
            lateTeams.includes(b[0]) ||
            lateTeams.includes(b[1]);

        return Number(aLate) - Number(bLate);
    });
    return round;
}

	let roundRobinRounds = [];

	if(mode === "roundRobin"){

		roundRobinRounds =
			generateRoundRobin(names);

		roundRobinRounds.forEach(round => {

			round.forEach(match => {

				matches.push(match);
				
				groupMatches++;

			});

		});
	}

    if(
    mode === "groups" ||
    mode === "groupsPlacement"
){

        let split =
            Math.ceil(teams/2);

        let groupA =
            names.slice(0,split);

        let groupB =
            names.slice(split);
		
		groupInfo = "";

let roundsA =
    generateRoundRobin(groupA)
    .map(r => sortLateMatches(r));
let roundsB =
    generateRoundRobin(groupB)
    .map(r => sortLateMatches(r));

let maxRounds =
    Math.max(
        roundsA.length,
        roundsB.length
    );

groupInfo = `
<div class="team">
<h3>🅰 Gruppe A</h3>
${groupA.join("<br>")}
</div>

<div class="team">
<h3>🅱 Gruppe B</h3>
${groupB.join("<br>")}
</div>
`;

for(let r=0; r<maxRounds; r++){

    groupInfo += `
    <div class="team">
    <h3>🏐 Runde ${r+1}</h3>
    `;

    let aRound = roundsA[r] || [];
    let bRound = roundsB[r] || [];

    if(courts === 1){

        let maxMatches =
            Math.max(
                aRound.length,
                bRound.length
            );

        for(let m=0; m<maxMatches; m++){

            if(aRound[m]){

                matches.push(aRound[m]);
                groupMatches++;

                groupInfo += `
                🅰 ${aRound[m][0]}
                vs
                ${aRound[m][1]}<br>
                `;
            }

            if(bRound[m]){

                matches.push(bRound[m]);
                groupMatches++;

                groupInfo += `
                🅱 ${bRound[m][0]}
                vs
                ${bRound[m][1]}<br>
                `;
            }
        }

    } else {

        let maxMatches =
            Math.max(
                aRound.length,
                bRound.length
            );

        for(let m=0; m<maxMatches; m++){

            if(aRound[m]){
                matches.push(aRound[m]);
                groupMatches++;
            }

            if(bRound[m]){
                matches.push(bRound[m]);
                groupMatches++;
            }

            if(aRound[m] && bRound[m]){

                groupInfo += `
                Feld 1:
                ${aRound[m][0]}
                vs
                ${aRound[m][1]}
                <br>

                Feld 2:
                ${bRound[m][0]}
                vs
                ${bRound[m][1]}
                <br><br>
                `;
            }
        }
    }

    groupInfo += `
    </div>
    `;
}

     if(mode === "groupsPlacement"){

    let max =
        Math.min(groupA.length, groupB.length);

    matches.push([
        "--- PLATZIERUNGSSPIELE ---",
        ""
    ]);

    for(let i=max;i>=1;i--){

        let label = "";

        let platz = i * 2 - 1;

        if(i === 1){

            label = "🏆 Finale";

        } else {

            label =
                "Platz " +
                platz;
        }

        matches.push([
            label,
            ""
        ]);

        matches.push([
            "A" + i,
            "B" + i
        ]);
		placementMatches++;
    }
}
    }

    let slotLength =
        gameDuration + changeTime;

    let totalSlots =
        Math.ceil(matches.length / courts);

    let totalMinutes =
        totalSlots * slotLength;
	let hours =
    Math.floor(totalMinutes / 60);

	let minutes =
		totalMinutes % 60;

    let start =
        startTime.split(":");

    let current =
        parseInt(start[0]) * 60 +
        parseInt(start[1]);

let referees = [];

for(let i=0;i<matches.length;i++){

    let match = matches[i];

    if(
        !match[1] ||
        match[1] === ""
    ){
        referees.push("");
        continue;
    }

if(
    match[0].startsWith("A") ||
    match[0].startsWith("B")
){

    referees.push("offen");
    continue;
}

    let teamA = match[0];
    let teamB = match[1];

    let clubA =
        getClub(teamA, teamData);

    let clubB =
        getClub(teamB, teamData);

    let candidates =
        names.filter(name => {

            if(
                name === teamA ||
                name === teamB
            ){
                return false;
            }

            let club =
                getClub(name, teamData);

            if(
                club &&
                (
                    club === clubA ||
                    club === clubB
                )
            ){
                return false;
            }

// Erste Spiele: Spät-Teams vermeiden

if(
    i < 4 &&
    teamData.find(
        t => t.name === name
    )?.late
){
    return false;
}

            return true;
        });

if(candidates.length === 0){

    candidates =
        names.filter(name => {

            if(
                name === teamA ||
                name === teamB
            ){
                return false;
            }

            let club =
                getClub(name, teamData);

            return !(
                club &&
                (
                    club === clubA ||
                    club === clubB
                )
            );
        });
}

    candidates.sort((a,b)=>{

        let countA =
            refereeCount[a] || 0;

        let countB =
            refereeCount[b] || 0;

        return countA - countB;
    });

    let referee =
        candidates.length
        ? candidates[0]
        : "-";

    referees.push(referee);

    refereeCount[referee] =
        (refereeCount[referee] || 0) + 1;
}

let output = `
    <div class="team">
    <h3>🏆 Turnierübersicht</h3>

    <b>Vorrunde:</b> ${groupMatches}<br>
	<b>Platzierung:</b> ${placementMatches}<br>
	<b>Gesamt:</b> ${groupMatches + placementMatches}<br>
	<b>Felder:</b> ${courts}<br>

	<b>Gesamtdauer:</b>
	${hours}h ${String(minutes).padStart(2,'0')}min
    </div>

    ${groupInfo}

    <div class="team">
    <h3>📅 Spielplan</h3>
`;

	let roundIndex = 0;
	let matchCounter = 0;

    for(let i=0;i<matches.length;i++){

        if(
            mode === "roundRobin" &&
            matchCounter === 0
        ){
            output += `
                <br>
                <b>🏐 Runde ${roundIndex + 1}</b>
                <br><br>
            `;
        }

        if(i % courts === 0){

            var slotTime =
                current;

            current += slotLength;
        }

        let h =
            Math.floor(slotTime / 60);

        let m =
            slotTime % 60;

        let court =
            (i % courts) + 1;

 if(
    matches[i][0]
    .startsWith("---")
){

    output += `
    <hr>
    <b>${matches[i][0]}</b>
    <hr>
    `;

}
else if(
    matches[i][1] === ""
){

    output += `
    <br>
    <b>${matches[i][0]}</b>
    <br>
    `;

}
else{

output += `
    ${String(h).padStart(2,'0')}:
    ${String(m).padStart(2,'0')}
    | Feld ${court}
    | ${matches[i][0]}
    vs
    ${matches[i][1]}
    <br>

    👨‍⚖️ Schiri: ${referees[i]}
    <br><br>
`;
}

        if(mode === "roundRobin"){

            matchCounter++;

            if(
                roundRobinRounds[roundIndex] &&
                matchCounter >= roundRobinRounds[roundIndex].length
            ){
                roundIndex++;
                matchCounter = 0;
            }
        }
    }

    let endH =
        Math.floor(current / 60);

    let endM =
        current % 60;

	output += `
		</div>

		<div class="team">
		<h3>⏰ Turnierende</h3>

		${String(endH).padStart(2,'0')}:
		${String(endM).padStart(2,'0')}
		</div>
	`;

    document.getElementById(
        "tournamentOutput"
    ).innerHTML = output;
}

renderTeamTable();

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

</script>

</body>
